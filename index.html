<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ToDo">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" id="themeColor" content="#F2F2F7">
<title>ToDo</title>
<style>
  :root {
    --bg: #F2F2F7;
    --card: #FFFFFF;
    --card-pressed: #E5E5EA;
    --ink: #000000;
    --ink-2: #3C3C43;
    --ink-3: rgba(60,60,67,.68);
    --ink-4: rgba(60,60,67,.4);
    --separator: rgba(60,60,67,.12);
    --tint: #007AFF;
    --tint-soft: rgba(0,122,255,.12);
    --green: #34C759;
    --red: #FF3B30;
    --seg-bg: rgba(118,118,128,.12);
    --seg-thumb: #FFFFFF;
    --blur-bg: rgba(242,242,247,.72);
    --input-bg: rgba(118,118,128,.12);
    --card-drag: rgba(255,255,255,.62);
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
    --ring-track: rgba(60,60,67,.12);
  }
  [data-theme="dark"] {
    --bg: #000000;
    --card: #1C1C1E;
    --card-pressed: #2C2C2E;
    --ink: #FFFFFF;
    --ink-2: #EBEBF5;
    --ink-3: rgba(235,235,245,.6);
    --ink-4: rgba(235,235,245,.3);
    --separator: rgba(84,84,88,.6);
    --tint: #0A84FF;
    --tint-soft: rgba(10,132,255,.18);
    --green: #30D158;
    --red: #FF453A;
    --seg-bg: rgba(118,118,128,.24);
    --seg-thumb: #636366;
    --blur-bg: rgba(0,0,0,.65);
    --input-bg: rgba(118,118,128,.24);
    --card-drag: rgba(70,70,74,.6);
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.4);
    --ring-track: rgba(235,235,245,.14);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--ink);
    max-width: 560px;
    margin: 0 auto;
    height: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background .3s ease;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  /* ================= Header ================= */
  header {
    position: relative;
    z-index: 5;
    padding: calc(env(safe-area-inset-top,0px) + 18px) 20px 10px;
    background: var(--blur-bg);
    -webkit-backdrop-filter: blur(24px) saturate(1.8);
    backdrop-filter: blur(24px) saturate(1.8);
    border-bottom: 0.5px solid var(--separator);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-right {
    flex: none;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }
  .eyebrow {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .04em;
    color: var(--ink-3);
    text-transform: uppercase;
  }
  h1 {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: .01em;
    line-height: 1.15;
    margin-top: 2px;
  }
  .sub {
    font-size: 15px;
    color: var(--ink-3);
    margin-top: 3px;
    font-weight: 500;
    min-height: 20px;
  }

  /* progress ring */
  .ring-wrap { position: relative; width: 58px; height: 58px; flex: none; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-track { stroke: var(--ring-track); }
  .ring-fill {
    stroke: var(--green);
    stroke-linecap: round;
    transition: stroke-dashoffset .5s cubic-bezier(.4,0,.2,1);
  }
  .ring-label {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-size: 13px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--ink-2);
  }

  .theme-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: none;
    background: var(--seg-bg);
    color: var(--ink-2);
    cursor: pointer;
    display: grid; place-items: center;
    transition: transform .2s;
  }
  .theme-btn svg { width: 18px; height: 18px; }
  .theme-btn:active { transform: scale(.88); }

  /* ============ Segmented control ============ */
  .seg-wrap { padding: 12px 20px 12px; }
  .seg {
    position: relative;
    display: flex;
    background: var(--seg-bg);
    border-radius: 10px;
    padding: 2px;
    height: 34px;
  }
  .seg-thumb {
    position: absolute;
    top: 2px; bottom: 2px;
    width: calc((100% - 4px) / 3);
    background: var(--seg-thumb);
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,.12);
    transition: transform .28s cubic-bezier(.3,1.1,.4,1);
  }
  .seg button {
    flex: 1;
    position: relative;
    z-index: 1;
    border: none;
    background: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-2);
    cursor: pointer;
    border-radius: 8px;
    transition: color .2s;
  }
  .seg button.active { color: var(--ink); }

  /* ================= List ================= */
  .list-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  main {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 2px 16px 20px;
    -webkit-overflow-scrolling: touch;
  }
  /* PC用の細いスクロールバー */
  main::-webkit-scrollbar { width: 7px; }
  main::-webkit-scrollbar-thumb { background: var(--ink-4); border-radius: 4px; }
  main::-webkit-scrollbar-track { background: transparent; }

  /* スクロール可能なことを示す端のフェード */
  .fade {
    position: absolute;
    left: 0; right: 0;
    height: 30px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .25s ease;
    z-index: 3;
  }
  .fade-top { top: 0; background: linear-gradient(to bottom, var(--bg), transparent); }
  .fade-bottom { bottom: 0; background: linear-gradient(to top, var(--bg), transparent); }
  .fade.show { opacity: 1; }

  /* 「あと n 件」チップ */
  .more-chip {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 8px 14px;
    border: 0.5px solid var(--separator);
    border-radius: 999px;
    background: var(--blur-bg);
    -webkit-backdrop-filter: blur(20px) saturate(1.8);
    backdrop-filter: blur(20px) saturate(1.8);
    color: var(--ink-2);
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,.16);
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease, transform .25s ease;
    z-index: 4;
  }
  .more-chip.show {
    opacity: 1;
    transform: translateX(-50%);
    pointer-events: auto;
  }
  .more-chip svg { width: 12px; height: 12px; }

  .group {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: background .3s ease;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-3);
    letter-spacing: .02em;
    padding: 18px 8px 8px;
  }
  .section-title:first-child { padding-top: 6px; }
  .section-title.overdue { color: var(--red); }
  .row {
    position: relative;
    overflow: hidden;
    animation: slideIn .3s cubic-bezier(.3,1,.4,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }
  .group.no-anim .row { animation: none; }
  .row.removing {
    animation: collapse .28s ease forwards;
  }
  @keyframes collapse {
    to { opacity: 0; max-height: 0; }
  }
  .row { max-height: 200px; }
  .row + .row .swipe-content { border-top: 0.5px solid var(--separator); }

  /* ---- ドラッグ並べ替え ---- */
  .group.reordering {
    overflow: visible;
    background: transparent;   /* 半透明カードの下が透けるように */
    box-shadow: none;
  }
  .group.reordering .row { transition: transform .22s cubic-bezier(.3,1,.4,1); }
  .group.reordering .swipe-content { transition: border-radius .18s ease, border-color .18s ease; }
  .group.reordering .swipe-del { display: none; } /* 角丸の隙間から赤い削除ボタンが覗かないように */
  .row.dragging {
    transition: none !important;
    position: relative;
    z-index: 10;
    overflow: visible;   /* 角丸と影がクリップされないように */
  }
  .row.dragging .swipe-del { display: none; }
  .row.dragging .swipe-content {
    border-radius: 14px;
    border-top: none !important;
    transform: scale(1.04);
    background: var(--card-drag);
    -webkit-backdrop-filter: blur(14px) saturate(1.6);
    backdrop-filter: blur(14px) saturate(1.6);
    box-shadow: 0 12px 32px rgba(0,0,0,.28);
    transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
  }

  .swipe-content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 13px 16px;
    background: var(--card);
    transition: background .3s ease;
    touch-action: pan-y;
    will-change: transform;
  }
  .swipe-del {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 88px;
    border: none;
    background: var(--red);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    visibility: hidden; /* 通常時は完全非表示。スワイプ確定時のみ見せる */
  }
  .row.swiping .swipe-del { visibility: visible; }
  /* リストの角丸から赤がはみ出て見えないよう、端の行のボタンにも同じ角丸を付ける */
  .row:first-child .swipe-del { border-top-right-radius: 16px; }
  .row:last-child .swipe-del { border-bottom-right-radius: 16px; }

  .check {
    flex: none;
    width: 25px; height: 25px;
    border-radius: 50%;
    border: 1.8px solid var(--ink-4);
    background: transparent;
    cursor: pointer;
    display: grid; place-items: center;
    transition: border-color .2s, background .2s, transform .15s;
  }
  .check:active { transform: scale(.85); }
  .check svg { width: 13px; height: 13px; opacity: 0; transform: scale(.5); transition: all .2s cubic-bezier(.3,1.4,.5,1); }
  .row.done .check { background: var(--green); border-color: var(--green); }
  .row.done .check svg { opacity: 1; transform: scale(1); }
  .row.done .check { animation: bounce .35s cubic-bezier(.3,1.6,.5,1); }
  @keyframes bounce {
    0% { transform: scale(.8); } 60% { transform: scale(1.12); } 100% { transform: scale(1); }
  }

  .task-body { flex: 1; min-width: 0; }
  .task-text {
    font-size: 16.5px;
    line-height: 1.4;
    word-break: break-word;
    position: relative;
    display: inline;
    transition: color .25s;
  }
  .row.done .task-text {
    color: var(--ink-3);
    text-decoration: line-through;
    text-decoration-color: var(--ink-3);
    text-decoration-thickness: 1.5px;
  }
  .task-meta {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-top: 2px;
  }
  .task-time {
    font-size: 12.5px;
    color: var(--ink-3);
    font-variant-numeric: tabular-nums;
  }
  .due-badge {
    display: inline-flex;
    align-items: center;
    gap: 3.5px;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-3);
  }
  .due-badge svg { width: 12px; height: 12px; }
  .due-badge.today { color: #FF9F0A; }
  .due-badge.overdue { color: var(--red); }
  .row.done .due-badge { color: var(--ink-3); font-weight: 500; }

  .empty {
    text-align: center;
    padding: 72px 24px;
    color: var(--ink-3);
  }
  .empty .icon { margin-bottom: 14px; color: var(--ink-4); }
  .empty .icon svg { width: 52px; height: 52px; }
  .sub svg { width: 15px; height: 15px; vertical-align: -2.5px; margin-left: 2px; color: var(--green); }
  .empty strong { display: block; font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .empty p { font-size: 14px; line-height: 1.7; }

  /* ============== Input bar ============== */
  .composer {
    flex: none;
    background: var(--blur-bg);
    -webkit-backdrop-filter: blur(24px) saturate(1.8);
    backdrop-filter: blur(24px) saturate(1.8);
    border-top: 0.5px solid var(--separator);
  }
  .input-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 12px 16px calc(env(safe-area-inset-bottom,0px) + 14px);
  }
  /* 新規作成時に選んだ期限のチップ(全体をタップで取り消せる) */
  .pending-due {
    display: flex;
    align-items: center;
    gap: 6px;
    width: fit-content;
    margin: 10px 16px 0;
    padding: 9px 8px 9px 14px;
    background: var(--tint-soft);
    color: var(--tint);
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .pending-due[hidden] { display: none !important; } /* hidden属性を確実に効かせる */
  .pending-due:active { opacity: .6; }
  .pending-due svg { width: 13px; height: 13px; }
  .pending-due .chip-x {
    width: 26px; height: 26px;
    display: grid; place-items: center;
    border: none; background: none;
    color: inherit;
    font-size: 17px; line-height: 1;
    font-family: inherit;
    pointer-events: none; /* タップはチップ全体で受ける */
  }
  /* 期限選択ボタン(カレンダー) */
  .date-btn-wrap { position: relative; flex: none; }
  .date-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--input-bg);
    color: var(--ink-2);
    display: grid; place-items: center;
    cursor: pointer;
    transition: transform .15s, background .2s, color .2s;
  }
  .date-btn svg { width: 20px; height: 20px; }
  .date-btn.active { background: var(--tint-soft); color: var(--tint); }
  .date-input-overlay {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    opacity: 0;
    border: none; padding: 0;
    -webkit-appearance: none;
  }

  /* ============== 期限編集シート ============== */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    opacity: 0;
    transition: opacity .25s ease;
    z-index: 40;
  }
  .sheet-backdrop.show { opacity: 1; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    max-width: 560px; margin: 0 auto;
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 10px 20px calc(env(safe-area-inset-bottom,0px) + 18px);
    transform: translateY(105%);
    transition: transform .32s cubic-bezier(.3,1,.4,1);
    box-shadow: 0 -8px 40px rgba(0,0,0,.22);
    z-index: 41;
  }
  .sheet.show { transform: none; }
  .sheet-handle {
    width: 38px; height: 5px;
    border-radius: 3px;
    background: var(--ink-4);
    margin: 4px auto 14px;
  }
  .sheet-input {
    display: block;
    width: 100%;
    border: none;
    border-radius: 12px;
    background: var(--input-bg);
    color: var(--ink);
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .sheet-input:focus { outline: 2px solid var(--tint); }
  .sheet-caption {
    font-size: 12.5px;
    color: var(--ink-3);
    margin: 0 2px 14px;
  }
  .quick-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .quick-chip {
    flex: 1;
    padding: 11px 0;
    border: none;
    border-radius: 11px;
    background: var(--input-bg);
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, color .15s, transform .1s;
  }
  .quick-chip:active { transform: scale(.95); }
  .quick-chip.active { background: var(--tint); color: #fff; }
  .sheet-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--input-bg);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 15px; font-weight: 600;
  }
  .sheet-row input[type=date] {
    border: none; background: transparent;
    color: var(--tint);
    font-family: inherit; font-size: 15px; font-weight: 600;
    text-align: right;
  }
  .sheet-btn {
    display: block; width: 100%;
    border: none; border-radius: 12px;
    padding: 13px;
    margin-top: 8px;
    font-family: inherit; font-size: 16px; font-weight: 600;
    background: var(--input-bg); color: var(--ink);
    cursor: pointer;
  }
  .sheet-btn:active { opacity: .7; }
  .sheet-btn.primary { background: var(--tint); color: #fff; }
  .sheet-btn.danger { background: transparent; color: var(--red); }

  .input-bar input {
    flex: 1;
    font-family: inherit;
    font-size: 16px;
    padding: 12px 16px;
    border-radius: 22px;
    border: none;
    background: var(--input-bg);
    color: var(--ink);
    transition: box-shadow .2s;
  }
  .input-bar input::placeholder { color: var(--ink-3); }
  .input-bar input:focus { outline: none; box-shadow: 0 0 0 2px var(--tint); }
  .add-btn {
    flex: none;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--tint);
    color: #fff;
    cursor: pointer;
    display: grid; place-items: center;
    transition: transform .15s, opacity .2s;
    box-shadow: 0 4px 14px var(--tint-soft);
  }
  .add-btn:active { transform: scale(.88); }
  .add-btn svg { width: 20px; height: 20px; }

  body { position: relative; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  /* テーマ切り替えの円形リビール演出 */
  ::view-transition-old(root),
  ::view-transition-new(root) {
    animation: none;
    mix-blend-mode: normal;
  }
  ::view-transition-old(root) { z-index: 1; }
  ::view-transition-new(root) { z-index: 2; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="eyebrow" id="dateLine"></div>
      <h1>ToDo</h1>
      <div class="sub" id="subLine"></div>
    </div>
    <div class="header-right">
      <button class="theme-btn" id="themeBtn" aria-label="外観モードを切り替え"></button>
      <div class="ring-wrap" aria-hidden="true">
      <svg width="58" height="58" viewBox="0 0 58 58" fill="none">
        <circle class="ring-track" cx="29" cy="29" r="25" stroke-width="5"/>
        <circle class="ring-fill" id="ringFill" cx="29" cy="29" r="25" stroke-width="5"
                stroke-dasharray="157" stroke-dashoffset="157"/>
      </svg>
      <div class="ring-label" id="ringLabel">0%</div>
      </div>
    </div>
  </div>
</header>

<div class="seg-wrap">
  <div class="seg" id="seg">
    <div class="seg-thumb" id="segThumb"></div>
    <button data-filter="all" class="active">すべて</button>
    <button data-filter="active">未完了</button>
    <button data-filter="done">完了済み</button>
  </div>
</div>

<div class="list-wrap">
  <main id="list"></main>
  <div class="fade fade-top" id="fadeTop"></div>
  <div class="fade fade-bottom" id="fadeBottom"></div>
  <button class="more-chip" id="moreChip">
    <span id="moreChipText">あと0件</span>
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5.5L7 9.5L11 5.5"/></svg>
  </button>
</div>

<div class="composer">
  <button class="pending-due" id="pendingDueBar" hidden aria-label="期限を取り消す">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3.5" y="5" width="17" height="15.5" rx="3"/><path d="M3.5 9.5h17M8 3v3.5M16 3v3.5"/></svg>
    <span id="pendingDueText"></span>
    <span class="chip-x">×</span>
  </button>
  <div class="input-bar">
    <input id="newTask" type="text" placeholder="新規ToDo..." enterkeyhint="done" autocomplete="off">
    <div class="date-btn-wrap">
      <button class="date-btn" id="dateBtn" aria-label="期限を設定" tabindex="-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3.5" y="5" width="17" height="15.5" rx="3"/><path d="M3.5 9.5h17M8 3v3.5M16 3v3.5"/></svg>
      </button>
      <input type="date" id="newDue" class="date-input-overlay" aria-label="期限を選択">
    </div>
    <button class="add-btn" id="addBtn" aria-label="ToDoを追加">
      <svg viewBox="0 0 20 20" fill="none"><path d="M10 3v14M3 10h14" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
<div class="sheet" id="editSheet" hidden>
  <div class="sheet-handle"></div>
  <input type="text" class="sheet-input" id="sheetName" placeholder="タスク名" enterkeyhint="done" autocomplete="off">
  <div class="sheet-caption">変更はすぐに反映されます</div>
  <div class="quick-row">
    <button class="quick-chip" data-days="0">今日</button>
    <button class="quick-chip" data-days="1">明日</button>
    <button class="quick-chip" data-days="7">来週</button>
  </div>
  <label class="sheet-row">
    <span>日付を指定</span>
    <input type="date" id="sheetDate">
  </label>
  <button class="sheet-btn danger" id="sheetClear">期限を削除</button>
  <button class="sheet-btn primary" id="sheetDone">完了</button>
</div>

<script>
(function () {
  const KEY = "tasks-v2";
  const THEME_KEY = "tasks-theme";
  let tasks = [];
  let filter = "all";
  let themeMode = "auto"; // auto | light | dark
  let openRow = null;     // 現在スワイプで開いている行
  let reordering = false; // ドラッグ並べ替え中
  let justDragged = 0;    // ドラッグ直後の誤タップ防止用タイムスタンプ
  let lastScrollTs = 0;   // 直近のスクロール時刻(スクロール中のスワイプ誤発動防止)

  /* ---------- ストレージ層 ---------- */
  const store = {
    async get(k) {
      try { if (window.storage) { const r = await window.storage.get(k); return r ? r.value : null; } } catch(e){}
      try { if (typeof localStorage !== "undefined") return localStorage.getItem(k); } catch(e){}
      return null;
    },
    async set(k, v) {
      try { if (window.storage) { await window.storage.set(k, v); return; } } catch(e){}
      try { if (typeof localStorage !== "undefined") localStorage.setItem(k, v); } catch(e){}
    }
  };

  /* ---------- SVGアイコン ---------- */
  const ICONS = {
    sun: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.2M12 19.3v2.2M2.5 12h2.2M19.3 12h2.2M5.3 5.3l1.6 1.6M17.1 17.1l1.6 1.6M18.7 5.3l-1.6 1.6M6.9 17.1l-1.6 1.6"/></svg>',
    moon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.2 14.2A8.3 8.3 0 0 1 9.8 3.8a8.3 8.3 0 1 0 10.4 10.4Z"/></svg>',
    auto: '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.8"/><path d="M12 3.5a8.5 8.5 0 0 0 0 17Z" fill="currentColor"/></svg>',
    note: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="4" y="4.5" width="16" height="15" rx="3.5"/><path d="M8 9.5h8M8 14.5h5"/></svg>',
    search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.3 15.3L20.5 20.5"/></svg>',
    checkCircle: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.3l2.8 2.8L16.3 9.5"/></svg>'
  };

  /* ---------- テーマ ---------- */
  const mq = window.matchMedia("(prefers-color-scheme: dark)");
  const themeBtn = document.getElementById("themeBtn");
  const themeColorMeta = document.getElementById("themeColor");

  function applyTheme() {
    const dark = themeMode === "dark" || (themeMode === "auto" && mq.matches);
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    themeColorMeta.setAttribute("content", dark ? "#000000" : "#F2F2F7");
    themeBtn.innerHTML = themeMode === "auto" ? ICONS.auto : (themeMode === "dark" ? ICONS.moon : ICONS.sun);
    themeBtn.title = "外観: " + (themeMode === "auto" ? "自動" : themeMode === "dark" ? "ダーク" : "ライト");
  }
  mq.addEventListener("change", applyTheme);

  function resolvedDark() {
    return themeMode === "dark" || (themeMode === "auto" && mq.matches);
  }

  themeBtn.addEventListener("click", () => {
    const before = resolvedDark();
    themeMode = themeMode === "auto" ? "light" : themeMode === "light" ? "dark" : "auto";
    store.set(THEME_KEY, themeMode);

    const changed = resolvedDark() !== before;
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    // 見た目が変わらない切替・低モーション設定・非対応環境はそのまま適用
    if (!changed || reduceMotion || !document.startViewTransition) {
      applyTheme();
      return;
    }

    // ボタンを中心に新しいテーマが円形に広がる演出
    const vt = document.startViewTransition(() => applyTheme());
    vt.ready.then(() => {
      const r = themeBtn.getBoundingClientRect();
      const x = r.left + r.width / 2;
      const y = r.top + r.height / 2;
      const maxR = Math.hypot(
        Math.max(x, window.innerWidth - x),
        Math.max(y, window.innerHeight - y)
      );
      document.documentElement.animate(
        {
          clipPath: [
            "circle(0px at " + x + "px " + y + "px)",
            "circle(" + maxR + "px at " + x + "px " + y + "px)"
          ]
        },
        {
          duration: 520,
          easing: "cubic-bezier(.4, 0, .2, 1)",
          pseudoElement: "::view-transition-new(root)"
        }
      );
    }).catch(() => {});
  });

  /* ---------- ヘッダー ---------- */
  const days = ["日","月","火","水","木","金","土"];
  function renderDate() {
    const d = new Date();
    document.getElementById("dateLine").textContent =
      (d.getMonth()+1) + "月" + d.getDate() + "日 " + days[d.getDay()] + "曜日";
  }

  function renderHeader() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const remaining = total - done;
    const sub = document.getElementById("subLine");
    if (total === 0) {
      sub.textContent = "今日は何をしますか？";
    } else if (remaining === 0) {
      sub.innerHTML = "すべて完了しました" + ICONS.checkCircle;
    } else {
      sub.textContent = "残り " + remaining + " 件 / 全 " + total + " 件";
    }

    const pct = total === 0 ? 0 : Math.round(done / total * 100);
    const C = 157;
    document.getElementById("ringFill").style.strokeDashoffset = C - (C * pct / 100);
    document.getElementById("ringLabel").textContent = pct + "%";
  }

  /* ---------- リスト ---------- */
  const list = document.getElementById("list");
  const fadeTop = document.getElementById("fadeTop");
  const fadeBottom = document.getElementById("fadeBottom");
  const moreChip = document.getElementById("moreChip");
  const moreChipText = document.getElementById("moreChipText");

  function updateScrollHints() {
    const above = list.scrollTop > 8;
    const below = list.scrollTop + list.clientHeight < list.scrollHeight - 8;
    fadeTop.classList.toggle("show", above);
    fadeBottom.classList.toggle("show", below);

    let hidden = 0;
    if (below) {
      const limit = list.getBoundingClientRect().bottom - 24;
      list.querySelectorAll(".row").forEach(r => {
        if (r.getBoundingClientRect().top > limit) hidden++;
      });
    }
    if (below && hidden > 0 && !reordering) {
      moreChipText.textContent = "あと" + hidden + "件";
      moreChip.classList.add("show");
    } else {
      moreChip.classList.remove("show");
    }
  }
  list.addEventListener("scroll", () => {
    lastScrollTs = Date.now();
    if (openRow && !reordering) closeOpenRow(false); // スクロールしたら開いた削除ボタンを閉じる
    updateScrollHints();
  }, { passive: true });
  window.addEventListener("resize", updateScrollHints);
  moreChip.addEventListener("click", () => {
    list.scrollTo({ top: list.scrollHeight, behavior: "smooth" });
  });

  function fmtTime(ts) {
    const d = new Date(ts);
    const today = new Date();
    const isToday = d.toDateString() === today.toDateString();
    const hm = String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
    return isToday ? hm : (d.getMonth()+1) + "/" + d.getDate() + " " + hm;
  }

  /* 期限の表示: 期限切れ/今日/明日/日付 */
  const CAL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3.5" y="5" width="17" height="15.5" rx="3"/><path d="M3.5 9.5h17M8 3v3.5M16 3v3.5"/></svg>';
  function dueDiff(due) {
    const [y, m, d] = due.split("-").map(Number);
    const target = new Date(y, m - 1, d);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return Math.round((target - today) / 86400000);
  }
  function fmtDue(due) {
    const [, m, d] = due.split("-").map(Number);
    const diff = dueDiff(due);
    if (diff < 0)  return { text: m + "/" + d + " 期限切れ", cls: "overdue" };
    if (diff === 0) return { text: "今日まで", cls: "today" };
    if (diff === 1) return { text: "明日まで", cls: "" };
    return { text: m + "/" + d + "まで", cls: "" };
  }

  /* 期限によるグループ分け */
  const SECTIONS = [
    ["overdue",  "期限切れ"],
    ["today",    "今日"],
    ["tomorrow", "明日"],
    ["later",    "今後"],
    ["none",     "期限なし"]
  ];
  function dueGroupKey(t) {
    if (!t.due) return "none";
    const diff = dueDiff(t.due);
    if (diff < 0) return "overdue";
    if (diff === 0) return "today";
    if (diff === 1) return "tomorrow";
    return "later";
  }

  function render(skipAnim) {
    renderHeader();
    closeOpenRow(true);
    list.innerHTML = "";
    const shown = tasks.filter(t =>
      filter === "all" ? true : filter === "done" ? t.done : !t.done
    );

    if (shown.length === 0) {
      const div = document.createElement("div");
      div.className = "empty";
      div.innerHTML = tasks.length === 0
        ? '<div class="icon">' + ICONS.note + '</div><strong>ToDoはありません</strong><p>下の入力欄から追加できます</p>'
        : '<div class="icon">' + ICONS.search + '</div><strong>ここには何もありません</strong><p>フィルターを切り替えてみてください</p>';
      list.appendChild(div);
      requestAnimationFrame(updateScrollHints);
      return;
    }

    // 期限ごとにグループ分けして表示
    const buckets = { overdue: [], today: [], tomorrow: [], later: [], none: [] };
    for (const t of shown) buckets[dueGroupKey(t)].push(t);
    const activeSections = SECTIONS.filter(([k]) => buckets[k].length > 0);
    // 期限付きタスクが1つもないときは「期限なし」の見出しを出さない
    const onlyNone = activeSections.length === 1 && activeSections[0][0] === "none";

    for (const [key, label] of activeSections) {
      if (!onlyNone) {
        const h = document.createElement("div");
        h.className = "section-title" + (key === "overdue" ? " overdue" : "");
        h.textContent = label;
        list.appendChild(h);
      }
      const group = document.createElement("div");
      group.className = "group" + (skipAnim ? " no-anim" : "");
      for (const t of buckets[key]) group.appendChild(buildRow(t));
      list.appendChild(group);
    }
    requestAnimationFrame(updateScrollHints);
  }

  function buildRow(t) {
    const row = document.createElement("div");
    row.className = "row" + (t.done ? " done" : "");
    row.dataset.id = t.id;

    const del = document.createElement("button");
    del.className = "swipe-del";
    del.textContent = "削除";
    del.addEventListener("click", () => removeTask(t.id, row));

    const content = document.createElement("div");
    content.className = "swipe-content";

    const check = document.createElement("button");
    check.className = "check";
    check.setAttribute("aria-label", t.done ? "未完了に戻す" : "完了にする");
    check.innerHTML = '<svg viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4.5" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    check.addEventListener("click", (e) => {
      e.stopPropagation();
      if (reordering || Date.now() - justDragged < 350) return;
      toggle(t.id);
    });

    const body = document.createElement("div");
    body.className = "task-body";
    const text = document.createElement("span");
    text.className = "task-text";
    text.textContent = t.text;
    const meta = document.createElement("span");
    meta.className = "task-meta";
    const time = document.createElement("span");
    time.className = "task-time";
    time.textContent = fmtTime(t.created);
    meta.appendChild(time);
    if (t.due) {
      const d = fmtDue(t.due);
      const badge = document.createElement("span");
      badge.className = "due-badge" + (d.cls ? " " + d.cls : "");
      badge.innerHTML = CAL_SVG + "<span>" + d.text + "</span>";
      meta.appendChild(badge);
    }
    body.append(text, meta);

    // タップで期限編集シートを開く(PCのダブルクリック削除と競合しないよう少し遅延)
    let clickTimer = null;
    body.addEventListener("click", () => {
      if (reordering || Date.now() - justDragged < 350 || openRow) return;
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => openSheet(t.id), 220);
    });
    content.addEventListener("dblclick", () => clearTimeout(clickTimer));

    content.append(check, body);
    row.append(del, content);

    attachSwipe(row, content);
    attachDrag(row, content, t.id);
    return row;
  }

  /* ---------- スワイプで削除 ---------- */
  function closeOpenRow(instant) {
    if (!openRow) return;
    const r = openRow;
    const c = r.querySelector(".swipe-content");
    c.style.transition = instant ? "none" : "transform .25s cubic-bezier(.3,1,.4,1)";
    c.style.transform = "translateX(0)";
    openRow = null;
    if (instant) r.classList.remove("swiping");
    else setTimeout(() => { if (openRow !== r) r.classList.remove("swiping"); }, 270);
  }

  // 開いた削除ボタンは、リスト外のどこかをタップしても閉じる
  document.addEventListener("touchstart", (e) => {
    if (openRow && !reordering && !openRow.contains(e.target)) closeOpenRow(false);
  }, { passive: true });

  function attachSwipe(row, content) {
    let startX = 0, startY = 0, dx = 0, dragging = false, horizontal = null;
    const OPEN = -88;

    content.addEventListener("touchstart", (e) => {
      if (reordering) return;
      if (openRow && openRow !== row) closeOpenRow(false);
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      dragging = true;
      horizontal = null;
      content.style.transition = "none";
    }, { passive: true });

    content.addEventListener("touchmove", (e) => {
      if (!dragging || reordering) return;
      const mx = e.touches[0].clientX - startX;
      const my = e.touches[0].clientY - startY;
      if (horizontal === null) {
        if (Math.abs(mx) < 10 && Math.abs(my) < 10) return;
        // 明確に横方向の動きだけをスワイプと判定(斜めスクロールでの誤発動防止)
        // さらにスクロール直後(慣性スクロール中)はスワイプとみなさない
        horizontal = Math.abs(mx) > Math.abs(my) * 1.6 && Date.now() - lastScrollTs > 150;
      }
      if (!horizontal) return;
      row.classList.add("swiping"); // スワイプ確定時のみ赤ボタンを表示
      e.preventDefault(); // スワイプ確定中は縦スクロールを止めて赤ボタンのチラつきを防ぐ
      const base = (openRow === row) ? OPEN : 0;
      dx = Math.min(0, Math.max(OPEN * 1.6, base + mx));
      content.style.transform = "translateX(" + dx + "px)";
    }, { passive: false });

    content.addEventListener("touchend", () => {
      if (!dragging || reordering) { dragging = false; return; }
      dragging = false;
      content.style.transition = "transform .25s cubic-bezier(.3,1,.4,1)";
      if (horizontal && dx < OPEN / 2) {
        content.style.transform = "translateX(" + OPEN + "px)";
        openRow = row;
      } else {
        content.style.transform = "translateX(0)";
        if (openRow === row) openRow = null;
        // 閉じるアニメーション完了後に赤ボタンを非表示へ戻す
        setTimeout(() => { if (openRow !== row) row.classList.remove("swiping"); }, 270);
      }
      dx = 0;
    });

    // PC用: ダブルクリックで削除ボタン表示
    content.addEventListener("dblclick", () => {
      if (openRow === row) { closeOpenRow(false); return; }
      if (openRow) closeOpenRow(false);
      row.classList.add("swiping");
      content.style.transition = "transform .25s cubic-bezier(.3,1,.4,1)";
      content.style.transform = "translateX(-88px)";
      openRow = row;
    });
  }

  /* ---------- 長押しドラッグで並べ替え ---------- */
  function attachDrag(row, content, id) {
    let timer = null, active = false;
    let startX = 0, startY = 0, curY = 0;
    let rowH = 0, startIdx = 0, curIdx = 0;
    let rows = [], group = null, scrollStart = 0;
    const HOLD_MS = 280;

    function cancelTimer() { if (timer) { clearTimeout(timer); timer = null; } }

    function beginDrag() {
      timer = null;
      if (openRow) return;
      group = row.parentElement;
      rows = [...group.querySelectorAll(":scope > .row")];
      startIdx = rows.indexOf(row);
      curIdx = startIdx;
      rowH = row.offsetHeight;
      scrollStart = list.scrollTop;
      active = true;
      reordering = true;
      moreChip.classList.remove("show");
      group.classList.add("reordering");
      row.classList.add("dragging");
      applyShapes();
      updateDrag();
      requestAnimationFrame(scrollLoop);
    }

    /* 見た目上の並び順に合わせて各カードの角丸と区切り線を更新する。
       ・見た目の先頭 / ドラッグ中カードが入る隙間の直下 → 上の角を丸く
       ・見た目の末尾 / 隙間の直上 → 下の角を丸く */
    function applyShapes() {
      rows.forEach((r, i) => {
        if (r === row) return;
        let vi = i;
        if (i > startIdx && i <= curIdx) vi = i - 1;
        else if (i < startIdx && i >= curIdx) vi = i + 1;
        const first = vi === 0 || vi === curIdx + 1;
        const last  = vi === rows.length - 1 || vi === curIdx - 1;
        const c = r.querySelector(".swipe-content");
        c.style.borderRadius =
          (first ? "16px 16px " : "0 0 ") + (last ? "16px 16px" : "0 0");
        c.style.borderTopColor = first ? "transparent" : "";
      });
    }

    function dyNow() {
      return (curY - startY) + (list.scrollTop - scrollStart);
    }

    function updateDrag() {
      if (!active) return;
      const dy = dyNow();
      row.style.transform = "translateY(" + dy + "px)";
      const newIdx = Math.max(0, Math.min(rows.length - 1, startIdx + Math.round(dy / rowH)));
      if (newIdx !== curIdx) {
        curIdx = newIdx;
        rows.forEach((r, i) => {
          if (r === row) return;
          let off = 0;
          if (i > startIdx && i <= curIdx) off = -rowH;
          else if (i < startIdx && i >= curIdx) off = rowH;
          r.style.transform = off ? "translateY(" + off + "px)" : "";
        });
        applyShapes();
      }
    }

    function scrollLoop() {
      if (!active) return;
      const r = list.getBoundingClientRect();
      const zone = 80;
      let v = 0;
      if (curY < r.top + zone) v = -Math.min(14, (r.top + zone - curY) / 4);
      else if (curY > r.bottom - zone) v = Math.min(14, (curY - (r.bottom - zone)) / 4);
      if (v) { list.scrollTop += v; updateDrag(); }
      requestAnimationFrame(scrollLoop);
    }

    function endDrag(cancelled) {
      if (!active) return;
      active = false;
      justDragged = Date.now();
      const from = startIdx, to = cancelled ? startIdx : curIdx;
      // 目的位置へスナップさせてから確定
      row.style.transition = "transform .18s cubic-bezier(.3,1,.4,1)";
      row.style.transform = "translateY(" + ((to - from) * rowH) + "px)";
      row.classList.remove("dragging");
      setTimeout(() => {
        reordering = false;
        if (group) group.classList.remove("reordering");
        if (from !== to) applyReorder(id, from, to, rows.map(r => r.dataset.id));
        else render(true);
      }, 190);
    }

    // タッチ操作
    content.addEventListener("touchstart", (e) => {
      if (openRow || reordering) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      curY = startY;
      cancelTimer();
      timer = setTimeout(beginDrag, HOLD_MS);
    }, { passive: true });

    content.addEventListener("touchmove", (e) => {
      const t = e.touches[0];
      if (!active) {
        // 長押し前に動いたら「スクロール/スワイプ」と判断してドラッグは中止
        if (Math.abs(t.clientX - startX) > 8 || Math.abs(t.clientY - startY) > 8) cancelTimer();
        return;
      }
      e.preventDefault(); // ドラッグ中は画面スクロールを止める
      curY = t.clientY;
      updateDrag();
    }, { passive: false });

    content.addEventListener("touchend", () => { cancelTimer(); endDrag(false); });
    content.addEventListener("touchcancel", () => { cancelTimer(); endDrag(true); });

    // マウス操作(PC): 長押しでドラッグ開始
    content.addEventListener("mousedown", (e) => {
      if (e.button !== 0 || openRow || reordering) return;
      startX = e.clientX; startY = e.clientY; curY = startY;
      cancelTimer();
      timer = setTimeout(beginDrag, HOLD_MS);
      const move = (ev) => {
        if (!active) {
          if (Math.abs(ev.clientX - startX) > 8 || Math.abs(ev.clientY - startY) > 8) cancelTimer();
          return;
        }
        ev.preventDefault();
        curY = ev.clientY;
        updateDrag();
      };
      const up = () => {
        cancelTimer();
        endDrag(false);
        document.removeEventListener("mousemove", move);
        document.removeEventListener("mouseup", up);
      };
      document.addEventListener("mousemove", move);
      document.addEventListener("mouseup", up);
    });
  }

  /* ---------- 並べ替えの確定(フィルター表示中でも全体の順序を保つ) ---------- */
  function applyReorder(id, from, to, shownIds) {
    const newShown = [...shownIds];
    newShown.splice(from, 1);
    newShown.splice(to, 0, id);
    const shownSet = new Set(shownIds);
    const queue = [...newShown];
    const byId = {};
    tasks.forEach(t => { byId[t.id] = t; });
    tasks = tasks.map(t => shownSet.has(t.id) ? byId[queue.shift()] : t);
    save();
    render(true);
  }

  /* ---------- 操作 ---------- */
  const input = document.getElementById("newTask");

  /* 新規作成時の期限選択 */
  let pendingDue = "";
  const dateBtn = document.getElementById("dateBtn");
  const newDue = document.getElementById("newDue");
  const pendingDueBar = document.getElementById("pendingDueBar");
  const pendingDueText = document.getElementById("pendingDueText");

  function updatePendingBar() {
    if (pendingDue) {
      const [y, m, d] = pendingDue.split("-").map(Number);
      pendingDueText.textContent = "期限: " + m + "月" + d + "日";
      pendingDueBar.hidden = false;
      dateBtn.classList.add("active");
    } else {
      pendingDueBar.hidden = true;
      dateBtn.classList.remove("active");
    }
  }
  newDue.addEventListener("change", () => {
    pendingDue = newDue.value || "";
    updatePendingBar();
  });
  /* チップのどこをタップしても取り消せる。touchendで即時反応させ、
     preventDefaultで後続clickとの二重発火を防ぐ */
  function clearPending(e) {
    if (e.cancelable) e.preventDefault();
    pendingDue = "";
    newDue.value = "";
    updatePendingBar();
  }
  pendingDueBar.addEventListener("touchend", clearPending);
  pendingDueBar.addEventListener("click", clearPending);

  function save() { store.set(KEY, JSON.stringify(tasks)); }

  function add() {
    const text = input.value.trim();
    if (!text) return;
    const task = {
      id: Date.now() + "-" + Math.random().toString(36).slice(2,7),
      text, done: false, created: Date.now()
    };
    if (pendingDue) task.due = pendingDue;
    tasks.unshift(task);
    input.value = "";
    pendingDue = "";
    newDue.value = "";
    updatePendingBar();
    save();
    render();
  }

  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    save();
    render();
  }

  function removeTask(id, rowEl) {
    rowEl.classList.add("removing");
    setTimeout(() => {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }, 260);
  }

  /* ---------- 期限編集シート ---------- */
  let editingId = null;
  const editSheet = document.getElementById("editSheet");
  const sheetBackdrop = document.getElementById("sheetBackdrop");
  const sheetName = document.getElementById("sheetName");
  const sheetDate = document.getElementById("sheetDate");
  const sheetClear = document.getElementById("sheetClear");
  const quickChips = [...document.querySelectorAll(".quick-chip")];

  /* タスク名の編集(入力するそばから反映。空文字では上書きしない) */
  sheetName.addEventListener("input", () => {
    const t = tasks.find(x => x.id === editingId);
    if (!t) return;
    const v = sheetName.value.trim();
    if (!v) return;
    t.text = v;
    save();
    render(true);
  });
  sheetName.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sheetName.blur(); // キーボードを閉じる
  });

  function isoOffset(days) {
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + days);
    return d.getFullYear() + "-" +
      String(d.getMonth() + 1).padStart(2, "0") + "-" +
      String(d.getDate()).padStart(2, "0");
  }

  function refreshSheet(t) {
    sheetDate.value = t.due || "";
    sheetClear.style.display = t.due ? "" : "none";
    quickChips.forEach(ch => {
      ch.classList.toggle("active", !!t.due && t.due === isoOffset(Number(ch.dataset.days)));
    });
  }

  function openSheet(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    editingId = id;
    sheetName.value = t.text;
    refreshSheet(t);
    sheetBackdrop.hidden = false;
    editSheet.hidden = false;
    requestAnimationFrame(() => {
      sheetBackdrop.classList.add("show");
      editSheet.classList.add("show");
    });
  }

  function closeSheet() {
    sheetBackdrop.classList.remove("show");
    editSheet.classList.remove("show");
    editSheet.style.transform = ""; // スワイプ中の位置からそのまま下へアニメーション
    setTimeout(() => {
      sheetBackdrop.hidden = true;
      editSheet.hidden = true;
      editingId = null;
    }, 320);
  }

  /* 選んだ瞬間に反映(保存ボタン不要) */
  function applyDue(val) {
    const t = tasks.find(x => x.id === editingId);
    if (!t) return;
    if (val) t.due = val;
    else delete t.due;
    save();
    render(true);      // 背後のリストが即座に並び変わるのが見える
    refreshSheet(t);
  }

  quickChips.forEach(ch => {
    ch.addEventListener("click", () => applyDue(isoOffset(Number(ch.dataset.days))));
  });
  sheetDate.addEventListener("change", () => applyDue(sheetDate.value));
  sheetClear.addEventListener("click", () => { applyDue(""); closeSheet(); });
  document.getElementById("sheetDone").addEventListener("click", closeSheet);
  sheetBackdrop.addEventListener("click", closeSheet);

  /* 下スワイプでシートを閉じる */
  (function () {
    let sy = 0, dy = 0, draggingSheet = false;
    editSheet.addEventListener("touchstart", (e) => {
      if (e.target.closest("input, button")) return; // 操作部品の上では無効
      sy = e.touches[0].clientY;
      dy = 0;
      draggingSheet = true;
      editSheet.style.transition = "none";
    }, { passive: true });
    editSheet.addEventListener("touchmove", (e) => {
      if (!draggingSheet) return;
      dy = Math.max(0, e.touches[0].clientY - sy);
      editSheet.style.transform = "translateY(" + dy + "px)";
    }, { passive: true });
    editSheet.addEventListener("touchend", () => {
      if (!draggingSheet) return;
      draggingSheet = false;
      editSheet.style.transition = "";
      if (dy > 80) {
        closeSheet();
      } else {
        editSheet.style.transform = ""; // 元の位置へ戻る
      }
      dy = 0;
    });
  })();

  document.getElementById("addBtn").addEventListener("click", add);
  input.addEventListener("keydown", e => { if (e.key === "Enter") add(); });

  /* ---------- セグメントコントロール ---------- */
  const segBtns = [...document.querySelectorAll(".seg button")];
  const segThumb = document.getElementById("segThumb");
  segBtns.forEach((btn, i) => {
    btn.addEventListener("click", () => {
      filter = btn.dataset.filter;
      segBtns.forEach(b => b.classList.toggle("active", b === btn));
      segThumb.style.transform = "translateX(" + (i * 100) + "%)";
      render();
    });
  });

  /* ---------- 初期化 ---------- */
  renderDate();
  applyTheme();
  Promise.all([store.get(KEY), store.get(THEME_KEY)]).then(([data, theme]) => {
    try { tasks = data ? JSON.parse(data) : []; } catch(e) { tasks = []; }
    if (!Array.isArray(tasks)) tasks = [];
    if (theme === "light" || theme === "dark" || theme === "auto") themeMode = theme;
    applyTheme();
    render();
  });
})();
</script>
</body>
</html>
